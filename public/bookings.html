<las-date-range initial-selection="day" range="bookingRange"></las-date-range>
<div class="container_fluid">
	<div class="row_fluid">
		<div class="col-md-8">			
			<las-booking-history range="bookingRange" user-id="user.id" ></las-booking-history>
		</div>
		<div class="col-md-4">
			<div>		
				<h4>By Category</h4>
				<las-booking-pie-chart range="bookingRange" user-id="user.id" source="'category'"></las-booking-tag-chart>
			</div>
			<div>
				<h4>By Project</h4>
				<las-booking-pie-chart range="bookingRange" user-id="user.id" source="'project'"></las-booking-tag-chart>
			</div>
			<div>
				<h4>By Tag</h4>
				<las-booking-bar-chart range="bookingRange" user-id="user.id" source="'tag'" serie="Tags" width="300" height="300"></las-booking-tag-chart>
			</div>
		</div>
	</div>
</div>
