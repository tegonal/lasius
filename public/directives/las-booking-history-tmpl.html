<div class="booking-table">
<h3>Current Days booking</h3>
<table class="table">
	<tr>
		<th>Project Id</th>
		<th>From</th>
		<th>To</th>
		<th>Amount</th>
	</tr>
    <tr ng-repeat="booking in bookings">
        <td>{{booking.projectId}}</td>
        <td>{{booking.start | date: 'dd.MM HH:mm'}}</td>
        <td>{{booking.end | date: 'dd.MM HH:mm'}}</td>
        <td>{{diff(booking) | amDateFormat:'H:m'}}</td>
    </tr>
</table>
</div>
