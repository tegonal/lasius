<div class="booking-table">
<table class="table table-stripe">
	<tr>
		<th>Project</th>
		<th>Tags</th>
		<th>From</th>
		<th>To</th>
		<th>Amount</th>
		<th></th>
	</tr>	
	<tr>
		<!-- Total row -->
		<th colspan="4">Total</th>
		<th>{{bookings | sumFilter:diff| number : 1}}</th>
		<td></td>
	</tr>
    <tr ng-repeat="booking in bookings">
        <td>{{booking.projectId}}@{{booking.categoryId}}</td>
        <td>
            <span ng-repeat="tag in booking.tags" >
		        <span style="margin-right: 3px;" class="ui-select-match-item btn btn-default btn-xs" type="button">        
		            <span>{{tag}}</span>        
		        </span>
            </span>
        </td>
        <td>{{booking.start | date: 'HH:mm'}}</td>
        <td>{{booking.end | date: 'HH:mm'}}</td>
        <td>{{diff(booking)| number : 1}}</td>
        <td><span class="glyphicon glyphicon-remove" ng-click="removeTimeBooking(booking.id)"></span></td>
    </tr>
</table>
</div>
