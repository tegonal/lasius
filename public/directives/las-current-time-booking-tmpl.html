 <div class="booking">
    <h1>{{booking.projectId}}</h1>
    <span ng-repeat="tag in booking.tags" style="margin-right: 3px;" class="ui-select-match-item btn btn-default btn-xs" type="button">        
        <span>{{tag}}</span>        
    </span>
  	<p>Started:<span am-time-ago="booking.start" am-preprocess="utc"></p>
 	<button class="btn" ng-click="stopBooking(booking.id)" ng-disabled="disableButton">Stop</button>
 </div>
