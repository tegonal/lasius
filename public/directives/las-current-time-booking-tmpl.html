 <div class="panel panel-info" ng-if="!noBooking">
 	<div class="panel-heading">
 		{{booking.projectId}}<small>@{{booking.categoryId}}</small>
    	<span ng-repeat="tag in booking.tags" >
		    <span style="margin-right: 3px;" class="ui-select-match-item btn btn-default btn-xs" type="button">        
		        <span>{{tag}}</span>        
		    </span>
	    </span>
	</div>
    <div class="panel-body align_center current_booking_content">  	
	  	<span class="text_big" ng-if="duration.moment.hours() > 2">{{duration.moment.hours()-1}} <small>hours</small></span>
	  	<span class="text_big" ng-if="duration.moment.hours() == 2">1 <small>hour</small></span>
	  	<span class="text_big" ng-if="duration.moment.minutes() > 1">{{duration.moment.minutes()}} <small>minutes</small></span>
	  	<span class="text_big" ng-if="duration.moment.minutes() == 1">1 <small>minute</small></span>
	  	<span class="text_big" >{{duration.moment | amDateFormat:'s'}} <small>seconds</small></span>
  	</div>
  	<div class="panel-footer">
  		<button class="btn btn-warning btn-lg btn-block" ng-click="stopBooking(booking.id)">Stop</button>
  	</div> 	
 </div>
 <div class="panel panel-warning" ng-if="noBooking">
 	<div class="panel-heading">Status
 	</div>
 	<div class="panel-body">
 		<span class="text_big">No Booking</span>
 	</div>
 </div>
