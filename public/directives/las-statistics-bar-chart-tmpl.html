<div class="booking-tag-stats">

<div class="chart" >
	<nvd3-multi-bar-chart data="statistics" x="xFunction()" y="yFunction()" 
	   showLegend="true" noData="No Statistics found!" tooltips="true" 
	   width="{{width}}" height="{{height}}" interactive="true" showValues="true"
            margin="{top: 50, right: 50, bottom: 50, left: 50}"
            showXAxis="true"
            showYAxis="true"
            stacked="true"
            reduceXTicks="true"
            rotateLabels="270">
    	<svg></svg>
    </nvd3-multi-bar-chart>
</div>

</div>
