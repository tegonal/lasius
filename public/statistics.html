<div class="container_fluid">
	<div class="row_fluid">
		<div class="col-md-8">
			<las-date-range initial-selection="month" range="statisticRange"></las-date-range>
			By Category
			<las-statistics-bar-chart range="statisticRange" user-id="user.id" source="'category'" width="800" height="300"></las-statistics-bar-chart>
			By Project
			<las-statistics-bar-chart range="statisticRange" user-id="user.id" source="'project'" width="800" height="300"></las-statistics-bar-chart>
		</div>
		<div class="col-md-4">
		<div>		
			<h4>By Category</h4>
			<las-booking-pie-chart range="statisticRange" user-id="user.id" source="'category'"></las-booking-tag-chart>
		</div>
		<div>
			<h4>By Project</h4>
			<las-booking-pie-chart range="statisticRange" user-id="user.id" source="'project'"></las-booking-tag-chart>
		</div>
		<div>
			<h4>By Tag</h4>
			<las-booking-bar-chart range="statisticRange" user-id="user.id" source="'tag'" serie="Tags" width="300" height="300"></las-booking-tag-chart>
		</div>
	</div>
</div>
